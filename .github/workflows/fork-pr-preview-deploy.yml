name: Fork PR Preview Deploy (Approved)

on:
  workflow_run:
    workflows: ["Fork PR Build (Artifact)"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Create an environment named "fork-preview" and require reviewers to make this manual.
    environment: fork-preview
    concurrency:
      group: fork-pr-preview-${{ github.event.workflow_run.id }}
      cancel-in-progress: false
    steps:
      - name: Compute preview metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.setFailed('No pull_requests associated with this workflow_run payload.');
              return;
            }
            const pr = prs[0];
            const prNumber = pr.number;
            const branch = `pr-${prNumber}`;
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('branch', branch);
            core.setOutput('preview_url', `https://${branch}.bip110.pages.dev`);

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          run-id: ${{ github.event.workflow_run.id }}
          path: dist

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy dist --project-name bip110 --branch "${{ steps.meta.outputs.branch }}"

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.meta.outputs.pr_number }}');
            const previewUrl = '${{ steps.meta.outputs.preview_url }}';
            const sha = context.payload.workflow_run.head_sha;

            const body = `## 🔗 Preview Deployment (Fork PR)\n\n**Preview URL:** ${previewUrl}\n\nBuilt from \`${sha.slice(0, 7)}\` and deployed after maintainer approval.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment (Fork PR)')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
